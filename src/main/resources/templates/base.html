<!DOCTYPE html>
<html lang="en" th:fragment="parent(content, title)">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-th-replace="${title}">Smart Contact Manager</title>
    <link rel="stylesheet" data-th-href="@{'/css/output.css'}" />
    <link rel="stylesheet" data-th-href="@{'/css/index.css'}" />
  </head>
  <body class="font-montserrat bg-gray-100 text-gray-800">
    <!-- Header Section -->
    <header class="bg-gray-900 text-white p-4 shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Smart Contact Manager</h1>
        <nav>
          <ul class="flex space-x-4">
            <li><a href="/" class="hover:text-gray-400">Home</a></li>
            <li><a href="/about" class="hover:text-gray-400">About</a></li>
            <li><a href="/services" class="hover:text-gray-400">Services</a></li>
            <li><a href="/contact" class="hover:text-gray-400">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Content Section -->
    <section data-th-replace="${content}" class="container mx-auto p-4 my-8 bg-white shadow-lg rounded-md">
      <!-- Content will be injected here -->
    </section>

    <!-- Footer Section -->
    <footer class="bg-gray-900 text-white p-4 mt-8">
      <div class="container mx-auto text-center">
        <p class="text-sm text-gray-400">&copy; 2024 Smart Contact Manager. Developed by Rohit Roy. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
